version: "3.9"

services:
  agent1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agent1
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    init: true
    extra_hosts:
      - "host.docker.internal:host-gateway"

  ollama:
    image: ollama/ollama:latest
    container_name: agent1-ollama
    profiles: ["local-llm"]
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

volumes:
  ollama-data:

