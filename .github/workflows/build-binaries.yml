name: Build Binaries

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[build]"

      - name: Build binary
        shell: bash
        run: |
          python -m PyInstaller --noconfirm --onefile --name agent1 --paths src src/agent1/main.py

      - name: Package artifact
        shell: bash
        run: |
          mkdir -p out
          cp .env.example out/.env.example
          cp README.md out/README.md
          if [ -f dist/agent1.exe ]; then
            cp dist/agent1.exe out/agent1.exe
          else
            cp dist/agent1 out/agent1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: agent1-${{ matrix.os }}
          path: out/*
